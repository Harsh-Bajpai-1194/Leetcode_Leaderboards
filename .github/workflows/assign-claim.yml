name: Issue Assigner

on:
  issue_comment:
    types: [created]

jobs:
  assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    # Explicitly wrapped in quotes to prevent exclamation mark tag-parsing bugs
    if: "!github.event.issue.pull_request && github.event.issue.assignee == null && contains(github.event.comment.body, '/claim')"

    steps:
      - name: Assign Issue to Commenter
        uses: actions/github-script@v6
        with:
          script: |
            const issueNumber = context.issue.number;
            const commenter = context.payload.commenter?.login || context.actor;

            // Assign the user who commented to the issue
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees: [commenter]
            });

            // Post a friendly confirmation comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `Assigned to @${commenter}! Happy coding! 🚀`
            });
