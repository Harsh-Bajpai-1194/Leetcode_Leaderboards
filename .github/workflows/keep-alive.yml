name: Keep-Alive Ping

on:
  schedule:
    # Runs every 5 minutes, the most frequent schedule allowed
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server to keep it alive
        run: |
          curl -s https://leetcode-leaderboards.onrender.com/api/health
          curl -s "https://leetcode-leaderboards.onrender.com/api/leaderboard?refresh=true" > /dev/null