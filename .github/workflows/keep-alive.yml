name: Scheduled Leaderboard Update

on:
  schedule:
    # This tells GitHub to run your sync-engine every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase Sync
        run: |
          curl -i -X POST \
          https://zxmysspedkhrtoqtbjtg.functions.supabase.co/sync-engine \
          -H "Content-Type: application/json"
