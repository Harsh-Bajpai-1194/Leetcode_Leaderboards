name: LeetCode Leaderboard Update

on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch:       # Allows manual trigger
    inputs:
      skip_followers:
        description: 'Skip follower sync for faster manual updates'
        required: false
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper
        env: 
          MONGO_URI: ${{ secrets.MONGO_URI }}
          SKIP_FOLLOWERS: ${{ github.event.inputs.skip_followers || 'false' }}
        run: python update_leaderboard.py
