name: LeetCode Leaderboard Update

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 10 minut
  workflow_dispatch:       # Allows manual trigger
    inputs:
      skip_followers:
        description: 'Skip follower sync for faster manual updates'
        required: false
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          npm install

      - name: Run Scraper
        env: 
          # Mapped your GitHub Secrets to the variables expected by your scripts
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_FOLLOWERS: ${{ github.event.inputs.skip_followers || 'false' }}
        run: |
          python update_leaderboard.py
          python followers.py
          node fix_names.js
